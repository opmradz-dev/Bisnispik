<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Sensor Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon-red: #ff4757; --neon-blue: #00d2d3; --neon-green: #1dd1a1; --neon-yellow: #feca57; --bg: #0a0a0c; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #fff; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .card { background: #16161a; border: 1px solid #333; border-radius: 10px; padding: 10px; position: relative; overflow: hidden; }
        .card-title { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .main-val { font-size: 1.8rem; font-weight: bold; font-family: 'Arial'; }
        
        .chart-box { height: 80px; width: 100%; margin-top: 5px; }
        
        /* Specific Colors */
        .heart { color: var(--neon-red); }
        .vibe { color: var(--neon-blue); }
        .wind { color: var(--neon-green); }
        .signal { color: var(--neon-yellow); }

        .full-width { grid-column: span 2; }
        
        button { 
            width: 100%; padding: 15px; background: #333; color: white; border: none; 
            border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .active-btn { background: var(--neon-red); }

        #video { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 1.2rem; font-weight: bold;">SENSOR HUB V1.0</div>
    <small id="sys-status">SISTEM SIAP - KLIK MULAI</small>
</div>

<div class="grid-container">
    <div class="card full-width">
        <div class="card-title">❤️ Detak Jantung (BPM)</div>
        <div class="main-val heart" id="val-heart">00</div>
        <div class="chart-box"><canvas id="chart-heart"></canvas></div>
    </div>

    <div class="card">
        <div class="card-title">📳 Getaran (m/s²)</div>
        <div class="main-val vibe" id="val-vibe">0.0</div>
        <div class="chart-box"><canvas id="chart-vibe"></canvas></div>
    </div>

    <div class="card">
        <div class="card-title">🌬️ Angin/Intensitas</div>
        <div class="main-val wind" id="val-wind">0%</div>
        <div class="chart-box"><canvas id="chart-wind"></canvas></div>
    </div>

    <div class="card">
        <div class="card-title">📡 Sinyal Satelit</div>
        <div class="main-val signal" id="val-signal">0 ms</div>
        <div class="chart-box"><canvas id="chart-signal"></canvas></div>
    </div>

    <div class="card">
        <div class="card-title">🌀 Frekuensi</div>
        <div class="main-val" id="val-freq" style="color:violet">0 Hz</div>
        <div class="chart-box"><canvas id="chart-freq"></canvas></div>
    </div>
</div>

<button id="masterBtn">AKTIFKAN SEMUA SENSOR</button>
<video id="video" autoplay playsinline></video>
<canvas id="procCanvas" width="30" height="30" style="display:none"></canvas>

<script>
let charts = {};
let isRunning = false;

// 1. Inisialisasi Grafik
function initChart(id, color) {
    const ctx = document.getElementById('chart-' + id).getContext('2d');
    return new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(20).fill(''),
            datasets: [{ data: Array(20).fill(0), borderColor: color, borderWidth: 2, tension: 0.4, pointRadius: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: {display: false}, y: {display: false} }, plugins: {legend: {display: false}} }
    });
}

charts.heart = initChart('heart', '#ff4757');
charts.vibe = initChart('vibe', '#00d2d3');
charts.wind = initChart('wind', '#1dd1a1');
charts.signal = initChart('signal', '#feca57');
charts.freq = initChart('freq', '#a29bfe');

// 2. Sensor Jantung (Kamera)
async function startKamera() {
    const video = document.getElementById('video');
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
    const canvas = document.getElementById('procCanvas');
    const ctx = canvas.getContext('2d');
    
    let peaks = [];
    setInterval(() => {
        ctx.drawImage(video, 0, 0, 30, 30);
        const data = ctx.getImageData(0,0,30,30).data;
        let rAvg = 0; for(let i=0; i<data.length; i+=4) rAvg += data[i];
        rAvg /= (data.length/4);
        
        updateChart(charts.heart, rAvg/2);
        if(rAvg > 200) { // Deteksi sederhana
            const now = Date.now();
            if(peaks.length === 0 || now - peaks[peaks.length-1] > 500) peaks.push(now);
            if(peaks.length > 5) {
                const bpm = Math.round(60000 / ((peaks[peaks.length-1] - peaks[0]) / (peaks.length-1)));
                document.getElementById('val-heart').innerText = (bpm > 40 && bpm < 150) ? bpm : "--";
                if(peaks.length > 10) peaks.shift();
            }
        }
    }, 100);
}

// 3. Sensor Getaran (Accelerometer)
function startVibration() {
    window.addEventListener('devicemotion', (event) => {
        const acc = event.acceleration;
        const total = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2).toFixed(2);
        document.getElementById('val-vibe').innerText = total;
        updateChart(charts.vibe, total);
    });
}

// 4. Sensor Angin (Microphone)
async function startWind() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    function checkWind() {
        analyser.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a, b) => a + b, 0);
        let vol = Math.round(sum / dataArray.length);
        document.getElementById('val-wind').innerText = vol + "%";
        updateChart(charts.wind, vol);
        document.getElementById('val-freq').innerText = (vol * 12) + " Hz";
        updateChart(charts.freq, vol * 2);
        requestAnimationFrame(checkWind);
    }
    checkWind();
}

// 5. Simulasi Sinyal (Ping Latency)
function startSignal() {
    setInterval(() => {
        const ping = Math.floor(Math.random() * 50) + 20;
        document.getElementById('val-signal').innerText = ping + " ms";
        updateChart(charts.signal, ping);
    }, 1000);
}

function updateChart(chart, val) {
    chart.data.datasets[0].data.push(val);
    chart.data.datasets[0].data.shift();
    chart.update('none');
}

document.getElementById('masterBtn').onclick = function() {
    if(isRunning) return;
    this.innerText = "SENSOR AKTIF";
    this.classList.add('active-btn');
    document.getElementById('sys-status').innerText = "MENERIMA DATA REAL-TIME...";
    
    startKamera();
    startVibration();
    startWind();
    startSignal();
    isRunning = true;
};
</script>

</body>
</html>
