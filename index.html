<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Rate Monitor Asli</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        #video { display: none; } /* Sembunyikan preview kamera */
        #canvas { display: none; } 
        
        .bpm-display {
            font-size: 5rem;
            font-weight: bold;
            color: #ff4757;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }
        
        .guide {
            background: #2f3542;
            padding: 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .status-dot {
            height: 15px;
            width: 15px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }

        .active { background-color: #ff4757; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Heart Rate Monitor</h2>
    <div class="guide" id="instruction">
        Tekan tombol di bawah dan tempelkan ujung jari Anda hingga <b>menutupi seluruh lensa kamera belakang</b>.
    </div>

    <div class="bpm-display" id="bpm">--</div>
    <div>BPM</div>

    <div style="margin-top: 20px;">
        <span id="dot" class="status-dot"></span>
        <span id="statusText">Sensor Mati</span>
    </div>

    <button id="startBtn">Mulai Sensor</button>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="100" height="100"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const bpmDisplay = document.getElementById('bpm');
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('statusText');
    const dot = document.getElementById('dot');

    let isMeasuring = false;
    let heartRates = [];
    let lastValue = 0;
    let peaks = [];

    startBtn.addEventListener('click', async () => {
        if (isMeasuring) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' }, // Gunakan kamera belakang
                audio: false
            });
            
            video.srcObject = stream;
            isMeasuring = true;
            startBtn.style.display = 'none';
            statusText.innerText = "Menganalisa Aliran Darah...";
            dot.classList.add('active');

            processFrame();
        } catch (err) {
            alert("Gagal mengakses kamera. Pastikan menggunakan HTTPS dan memberi izin kamera.");
        }
    });

    function processFrame() {
        if (!isMeasuring) return;

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        let rSum = 0;
        // Ambil rata-rata nilai warna merah (Red channel)
        for (let i = 0; i < data.length; i += 4) {
            rSum += data[i];
        }
        
        const rAvg = rSum / (data.length / 4);
        analyzePulse(rAvg);

        requestAnimationFrame(processFrame);
    }

    function analyzePulse(val) {
        // Filter sederhana untuk mendeteksi puncak detak
        if (val > lastValue && val > 150) { // Angka 150 asumsi jari menutupi kamera & terkena cahaya/flash
            const now = Date.now();
            if (peaks.length === 0 || now - peaks[peaks.length - 1] > 400) { // Limit 400ms antar detak (max 150 BPM)
                peaks.push(now);
            }
        }
        lastValue = val;

        // Hitung BPM setiap 5 detik data terkumpul
        if (peaks.length > 5) {
            const first = peaks[0];
            const last = peaks[peaks.length - 1];
            const diff = (last - first) / 1000; // detik
            const bpm = Math.round((peaks.length / diff) * 60);
            
            if (bpm > 40 && bpm < 180) {
                bpmDisplay.innerText = bpm;
            }
            
            // Reset periodik agar data tetap baru
            if (peaks.length > 20) peaks.shift();
        }
    }
</script>

</body>
</html>
